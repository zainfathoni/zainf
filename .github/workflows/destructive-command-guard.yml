name: Destructive Command Guard

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: Dicklesworthstone/destructive_command_guard/action@v0.4.5
        with:
          paths: .
          fail-on: error
          format: markdown
          comment-on-pr: false
